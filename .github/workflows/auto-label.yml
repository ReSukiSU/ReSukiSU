name: Auto Label and Close Invalid Issues
on:
  issues:
    types: [opened, edited]
jobs:
  label-and-close:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.issue.body || "";
            const expectedLabels = [];

            if (body.match(/### Kernel Version Category \/ 内核版本分类\s+5\.10-/)) expectedLabels.push("nongki");
            if (body.match(/### Kernel Version Category \/ 内核版本分类\s+5\.10\+/)) expectedLabels.push("gki");
            if (body.match(/### Hook Type \/ Hook 类型\s+susfs/)) expectedLabels.push("susfs");
            if (body.match(/### Hook Type \/ Hook 类型\s+tracepoint/)) expectedLabels.push("tracepoint");
            if (body.match(/### Hook Type \/ Hook 类型\s+manual/)) expectedLabels.push("manual");

            const managedLabels = ["nongki", "gki", "susfs", "tracepoint", "manual"];
            const currentLabels = context.payload.issue.labels.map(l => l.name);

            const labelsToAdd = expectedLabels.filter(l => !currentLabels.includes(l));
            const labelsToRemove = currentLabels.filter(l => managedLabels.includes(l) && !expectedLabels.includes(l));

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: labelsToAdd
              });
            }

            for (const label of labelsToRemove) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label
                });
              } catch (error) {
                console.error(error);
              }
            }

            if (context.payload.issue.state === "open") {
              const logsMatch = body.match(/### Logs \/ 日志\s*\n+([\s\S]*?)(?=\n###|$)/);
              const logsContent = logsMatch ? logsMatch[1].trim() : "";

              const hasLogFile = /\.(txt|log|old|logcat|dmesg|dump|crash|trace|bugreport|tar|gz|tgz|bz2|xz|lz4|zst|zip|7z|rar)(\b|[)\s])/i.test(logsContent) || /https?:\/\//i.test(logsContent);

              if (!logsContent || (!hasLogFile && logsContent.length <= 50)) {
                const closeMessage = "由于 Issue 中未在 Logs / 日志 中提供日志，自动关闭此 Issue。请通过 KernelSU 管理器 - 设置 - 报告日志 上传 bugreport 文件后重新创建 Issue。\nThis issue is automatically closed because no logs were provided in the Logs section. Please upload the bugreport file via KernelSU Manager - Settings - Report log and create a new issue.";
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: closeMessage
                });
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  state: "closed",
                  state_reason: "not_planned"
                });
                await github.rest.issues.lock({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  lock_reason: "resolved"
                });
              }
            }